<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Gym | Edit Comment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gym-primary: #0d6efd;
            --gym-bg: #f4f7fa;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--gym-bg); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(33, 37, 41, 0.85) !important;
            backdrop-filter: blur(15px);
        }

        .edit-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .detail-card { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        .form-control {
            border-radius: 12px;
            border: 1px solid #dee2e6;
            padding: 15px;
            background: rgba(255, 255, 255, 0.5);
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            border-color: var(--gym-primary);
        }

        .btn-update {
            background: var(--gym-primary);
            color: white;
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-update:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark py-3">
        <div class="container justify-content-center">
            <span class="navbar-brand fw-bold">FUTURE <span class="text-primary">GYM</span> LOGS</span>
        </div>
    </nav>

    <div class="edit-container">
        <div class="detail-card">
            <div class="text-center mb-4">
                <i class="bi bi-pencil-square text-primary display-4"></i>
                <h2 class="fw-bold mt-2">Edit Comment</h2>
                <p class="text-muted">Updating response from: <strong>{{ comment.email }}</strong></p>
            </div>

            <form method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label fw-semibold text-secondary">Your Message</label>
                    <textarea name="user_comment" class="form-control" rows="6" required>{{ comment.comment }}</textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-update">
                        <i class="bi bi-check-lg me-2"></i>Save Changes
                    </button>
                    <a href="{% url 'detail_url' comment.post.name %}" class="btn btn-link text-decoration-none text-muted mt-2">
                        Cancel and Go Back
                    </a>
                </div>
            </form>
        </div>
    </div>
    <a href="{% url 'comm_delete_url' comment.id %}" 
                       class="btn btn-outline-danger border-0 py-2 fw-semibold"
                       onclick="return confirm('Are you sure you want to permanently delete this comment?')">
                        <i class="bi bi-trash3 me-2"></i>Delete Comment
                    </a>

    <footer class="bg-dark text-white py-4">
        <div class="container text-center text-muted">
            <small>© 2026 Future Gym Systems</small>
        </div>
    </footer>

</body>
</html>
