{% extends 'base.html' %}
{% block title %}Future Gym | Edit Comment{% endblock %}
{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="{% url 'home_url' %}">
            <i class="bi bi-lightning-charge-fill text-primary"></i> FUTURE<span class="text-primary">GYM</span>
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="{% url 'home_url' %}">Home</a></li>
            </ul>
        </div>
    </div>
</nav>
{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="glass-card fade-in">
                <div class="text-center mb-4">
                    <i class="bi bi-pencil-square text-primary display-4"></i>
                    <h2 class="fw-bold mt-2">Edit Comment</h2>
                    <p class="text-muted">Updating response from: <strong>{{ comment.email }}</strong></p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary">Your Message</label>
                        <textarea name="user_comment" class="form-control" rows="6" required>{{ comment.comment }}</textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-glow">
                            <i class="bi bi-check-lg me-2"></i>Save Changes
                        </button>
                        <a href="javascript:history.back()" class="btn btn-link text-decoration-none text-muted mt-2"><i class="bi bi-arrow-left me-1"></i>Back</a>
                    </div>
                </form>
            </div>

            <div class="text-center mt-3">
                <a href="{% url 'comm_delete_url' comment.id %}"
                   class="btn btn-outline-danger border-0 py-2 fw-semibold"
                   onclick="return confirm('Are you sure you want to permanently delete this comment?')">
                    <i class="bi bi-trash3 me-2"></i>Delete Comment
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
