<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Membership ID - {{ person.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    @page { margin: 0; size: 85.6mm 54mm; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .id-card {
      width: 85.6mm;
      height: 54mm;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      display: flex;
      align-items: center;
      padding: 5mm 6mm;
      box-sizing: border-box;
    }
    .qr-img { width: 32mm; height: 32mm; }
    .info { flex: 1; padding-left: 5mm; }
    .gym-name { color: #818cf8; font-size: 4mm; font-weight: 800; letter-spacing: 0.5mm; }
    .member-name { font-size: 5mm; font-weight: 700; margin: 1mm 0; line-height: 1.1; }
    .role-badge {
      display: inline-block;
      background: {% if person.role == 'trainer' %}#22c55e{% else %}#0ea5e9{% endif %};
      padding: 0.5mm 2mm;
      border-radius: 1mm;
      font-size: 2.8mm;
      font-weight: 600;
    }
    .detail { font-size: 2.5mm; color: rgba(255,255,255,0.6); margin-top: 0.5mm; }
    .detail span { color: white; }
    .unique-id { font-size: 2.2mm; color: rgba(255,255,255,0.4); margin-top: 1mm; word-break: break-all; }
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="id-card">
    <div>
        <img src="{{ qr_uri }}" alt="QR" class="qr-img">
    </div>
    <div class="info">
      <div class="gym-name"><i class="bi bi-lightning-charge-fill"></i> FUTURE GYM</div>
      <div class="member-name">{{ person.name }}</div>
      <div class="role-badge">{{ person.get_role_display }}</div>
      <div class="detail">ID: <span>{{ mid.unique_id|slice:":20" }}...</span></div>
      {% if person.category %}
        <div class="detail">Category: <span>{{ person.category.name }}</span></div>
      {% endif %}
      <div class="unique-id">{{ mid.unique_id }}</div>
    </div>
  </div>
  <div style="text-align:center;padding:3mm;font-size:2.5mm;color:#999;">
    Present this card at the gym entrance scanner
  </div>
</body>
</html>
