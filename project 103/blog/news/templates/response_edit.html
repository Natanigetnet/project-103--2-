{% extends 'base.html' %}
{% block title %}Gym | Edit Response{% endblock %}
{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="{% url 'home_url' %}">
            <i class="bi bi-lightning-charge-fill text-primary"></i> FUTURE<span class="text-primary">GYM</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <i class="bi bi-list fs-2 text-white"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="{% url 'home_url' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="javascript:history.back()"><i class="bi bi-arrow-left me-1"></i>Back</a></li>
            </ul>
        </div>
    </div>
</nav>
{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="glass-card fade-in">
                <div class="text-center mb-4">
                    <i class="bi bi-pencil-square text-primary display-4"></i>
                    <h3 class="fw-bold mt-2">Edit Staff Response</h3>
                </div>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="text" class="form-label fw-bold">Update Response</label>
                        <textarea
                            name="text"
                            id="text"
                            class="form-control"
                            rows="5"
                            required>{{ item.text }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <a href="{% url 'response_list_url' %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-glow">Update Response</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
