{% extends 'base.html' %}
{% block title %}Logged Out{% endblock %}
{% block extra_head %}<style>body { background: linear-gradient(135deg, #0f172a, #1e293b) !important; }</style>{% endblock %}
{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="{% url 'home_url' %}">
            <i class="bi bi-lightning-charge-fill text-primary"></i> FUTURE<span class="text-primary">GYM</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <i class="bi bi-list fs-2 text-white"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="{% url 'home_url' %}">Home</a></li>
            </ul>
        </div>
    </div>
</nav>
{% endblock %}
{% block content %}
<div class="gradient-header text-center my-5">
    <div class="container py-5 fade-in">
        <i class="bi bi-check-circle-fill text-primary display-1"></i>
        <h1 class="display-4 fw-bold mt-3">Logged Out</h1>
        <p class="lead opacity-75">You have been successfully logged out of Future Gym.</p>
        <div class="mt-4">
            <a href="{% url 'login_url' %}" class="btn btn-outline-glow btn-lg px-5">Login Again</a>
            <a href="{% url 'home_url' %}" class="btn btn-glow btn-lg px-5 ms-2">Back Home</a>
        </div>
    </div>
</div>
{% endblock %}
