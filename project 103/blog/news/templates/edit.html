<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Member: {{ member.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">Edit Member Details</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="full_name" class="form-control" value="{{ member.name }}" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Detail</label>
                            <textarea name="detail" class="form-control" rows="4" required>{{ member.detail }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-select" required>
                                {% for cat in categories %}
                                    <option value="{{ cat.id }}" {% if cat.id == member.category.id %}selected{% endif %}>
                                        {{ cat.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Current Image</label>
                            {% if member.image %}
                                <div class="mb-2">
                                    <img src="{{ member.image.url }}" style="width: 100px; border-radius: 5px;">
                                </div>
                            {% endif %}
                            <input type="file" name="profile_image" class="form-control" accept="image/*" />
                            <small class="text-muted">Leave empty to keep the current image.</small>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'home_url' %}" class="btn btn-secondary">Back to List</a>
                            <button type="submit" class="btn btn-warning">Update Entry</button>
                        </div>
                        <div class="d-flex justify-content-between mt-4">

                        <a href="{% url 'delete_m_url' member.name %}" 
                        class="btn btn-outline-danger px-4" 
                        onclick="return confirm('Are you sure you want to permanently delete this profile? This cannot be undone.');">
                            <i class="bi bi-trash"></i> Delete Profile
                        </a>
                    </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
