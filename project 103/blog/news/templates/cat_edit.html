<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gym | Edit Category</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7fa; min-height: 100vh; display: flex; align-items: center; }
        .edit-card { 
            max-width: 500px; width: 100%; margin: auto; 
            background: white; padding: 30px; border-radius: 20px; 
            shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="edit-card shadow-lg">
        <h3 class="fw-bold mb-4 text-center">Edit Category</h3>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-semibold">Category Name</label>
                <input type="text" name="category_name" class="form-control form-control-lg" 
                       value="{{ category.name }}" required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">Update Name</button>
                <a href="{% url 'cat_list_url' %}" class="btn btn-link text-decoration-none text-muted">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
