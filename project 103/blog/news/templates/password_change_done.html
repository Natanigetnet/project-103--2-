{% extends 'base.html' %}
{% block title %}Password Changed{% endblock %}
{% block navbar %}
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-4" href="{% url 'home_url' %}">
            <i class="bi bi-lightning-charge-fill text-primary"></i> FUTURE<span class="text-primary">GYM</span>
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="{% url 'home_url' %}">Home</a></li>
            </ul>
        </div>
    </div>
</nav>
{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="glass-card fade-in">
                <i class="bi bi-check-circle-fill text-success fs-1 mb-3 d-block"></i>
                <h4 class="fw-bold">Password Updated</h4>
                <p class="text-white-50">Your password has been changed successfully.</p>
                <a href="{% url 'home_url' %}" class="btn btn-glow mt-3">Return Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
