<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Names</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="modal fade" id="addNameModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Entry</h5>
                <button type="button" class="btn-close" onclick="closeNameModal()"></button>
            </div>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="full_name" class="form-control" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Detail</label>
                        <textarea name="detail" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-select" required>
                            <option value="">Select a Category</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Profile Image</label>
                        <input type="file" name="profile_image" class="form-control" accept="image/*" />
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeNameModal()">Cancel</button>
                    <button type="submit" class="btn btn-success">Save Entry</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="container mt-5">
    <div class="d-flex justify-content-between mb-3">
        <h3>Members / Names List</h3>
        <button class="btn btn-primary" onclick="openNameModal()">Add New</button>
    </div>

    <table class="table table-bordered bg-white shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th width="180">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for n in names %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>
                    {% if n.image %}
                        <img src="{{ n.image.url }}" alt="{{ n.name }}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 50%;">
                    {% else %}
                        <span class="text-muted">No Image</span>
                    {% endif %}
                </td>
                <td><strong>{{ n.name }}</strong></td>
                <td>{{ n.category.name|default:"Uncategorized" }}</td>
                <td>
                    <a href="#" class="btn btn-sm btn-warning">Edit</a>
                    <a href="#" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center">No entries found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let nameModal;

    function openNameModal() {
        const modalElement = document.getElementById('addNameModal');
        nameModal = new bootstrap.Modal(modalElement);
        nameModal.show();
    }

    function closeNameModal() {
        if (nameModal) {
            nameModal.hide();
        }
    }
</script>

</body>
</html>
