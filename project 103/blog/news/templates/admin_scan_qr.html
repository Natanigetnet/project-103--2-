{% extends 'base.html' %}
{% block title %}QR Scanner Hub{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="text-center mb-5">
        <h2 class="fw-bold"><i class="bi bi-qr-code-scan me-2"></i> Scanner Hub</h2>
        <p class="text-muted">Choose whether to check a member in or out</p>
      </div>

      <div class="row g-4">
        <div class="col-md-6">
          <a href="{% url 'admin_scan_checkin_url' %}" class="text-decoration-none">
            <div class="card border-0 shadow-lg rounded-4 bg-dark text-center p-5 h-100 hover-lift">
              <div class="display-1 text-success mb-3">
                <i class="bi bi-box-arrow-in-right"></i>
              </div>
              <h3 class="fw-bold text-white">Check In</h3>
              <p class="text-muted mb-0">Scan QR to record a member's arrival</p>
            </div>
          </a>
        </div>
        <div class="col-md-6">
          <a href="{% url 'admin_scan_checkout_url' %}" class="text-decoration-none">
            <div class="card border-0 shadow-lg rounded-4 bg-dark text-center p-5 h-100 hover-lift">
              <div class="display-1 text-warning mb-3">
                <i class="bi bi-box-arrow-right"></i>
              </div>
              <h3 class="fw-bold text-white">Check Out</h3>
              <p class="text-muted mb-0">Scan QR to record a member's departure</p>
            </div>
          </a>
        </div>
      </div>

      <div class="text-center mt-4">
        <a href="{% url 'attendance_dashboard_url' %}" class="btn btn-outline-secondary rounded-pill">
          <i class="bi bi-bar-chart me-1"></i> Attendance Dashboard
        </a>
        <a href="{% url 'admin_url' %}" class="btn btn-outline-secondary rounded-pill ms-2">
          <i class="bi bi-shield me-1"></i> Admin Portal
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
