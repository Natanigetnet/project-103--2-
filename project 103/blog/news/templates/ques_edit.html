<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Question</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px; border-radius: 15px;">
        <div class="card-body p-4">
            <h3 class="fw-bold mb-4 text-center">Update Question</h3>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Sender Name</label>
                    <input type="text" name="user_name" class="form-control" value="{{ item.name }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="user_email" class="form-control" value="{{ item.email }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Question Text</label>
                    <textarea name="user_quest" class="form-control" rows="5" required>{{ item.quest }}</textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{% url 'ques_list_url' %}" class="btn btn-link text-muted">Back to Log</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
