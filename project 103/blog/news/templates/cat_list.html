<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Categories</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="modal fade" id="categoryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Category</h5>
                <button type="button" class="btn-close" onclick="closeModal()"></button>
            </div>
            
            <form action="{% url 'cat_list_url' %}" method="post">                {% csrf_token %}
                <div class="modal-body">
                  <div class="mb-3">
                    <label class="form-label">Category Name</label>
                    <input type="text" name="category_name" class="form-control" placeholder="e.g. Strength, Cardio, Yoga" required />
                  </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-success">Save Category</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="container mt-5">
    <div class="d-flex justify-content-between mb-4 align-items-center">
        <h3 class="fw-bold">Gym Categories</h3>
        <button class="btn btn-primary shadow-sm" onclick="openModal()">
            <i class="bi bi-plus-lg"></i> Add Category
        </button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 bg-white">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Category Name</th>
                        <th width="200" class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cat in categories %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td class="fw-semibold">{{ cat.name }}</td>
                        <td class="text-center">
                            <a href="{% url 'cat_edit_url' cat.id %}" class="btn btn-sm btn-warning px-3">Edit</a>
                            
                            <a href="{% url 'delete_cat_url' cat.id %}" 
                               class="btn btn-sm btn-danger px-3"
                               onclick="return confirm('Delete this category? This might affect members linked to it.')">
                               Delete
                            </a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="3" class="text-center py-4 text-muted">No categories found. Start by adding one!</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let categoryModal;
    function openModal() {
        const modalElement = document.getElementById('categoryModal');
        categoryModal = new bootstrap.Modal(modalElement);
        categoryModal.show();
    }
    function closeModal() {
        if (categoryModal) { categoryModal.hide(); }
    }
</script>

</body>
</html>
