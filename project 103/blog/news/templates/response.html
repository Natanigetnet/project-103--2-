<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Gym | Submit Response</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --gym-primary: #0d6efd;
            --gym-bg: #f4f7fa;
        }
        body { 
            background-color: var(--gym-bg); 
            font-family: 'Inter', sans-serif; 
        }
        .response-card {
            border-radius: 15px;
            border: none;
        }
        .original-question {
            background-color: #f8f9fa;
            border-left: 4px solid var(--gym-primary);
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card response-card shadow-sm p-4">
                <div class="d-flex align-items-center mb-4">
                    <a href="{% url 'ques_list_url' %}" class="btn btn-light rounded-circle me-3">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <h2 class="fw-bold mb-0">Submit Response</h2>
                </div>

                <div class="original-question p-4 mb-4">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="fw-bold text-primary">{{ question.name }}</span>
                        <small class="text-muted">{{ question.email }}</small>
                    </div>
                    <p class="mb-0 text-dark">{{ question.quest }}</p>
                </div>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="answer_text" class="form-label fw-semibold">Your Official Response</label>
                        <textarea 
                            name="answer_text" 
                            id="answer_text" 
                            class="form-control rounded-3" 
                            rows="6" 
                            placeholder="Type your answer here..." 
                            required></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary py-2 fw-bold rounded-pill">
                            <i class="bi bi-send me-2"></i>Post Response
                        </button>
                        <a href="{% url 'ques_list_url' %}" class="btn btn-link text-muted">Cancel and Go Back</a>
                    </div>
                </form>
            </div>

            <div class="text-center mt-4 text-muted">
                <small>© 2026 Future Gym Systems • Staff Portal</small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
